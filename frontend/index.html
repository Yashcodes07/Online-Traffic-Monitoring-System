<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helmet Detection System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
                    <path d="M20 10 C25 10, 28 13, 28 18 C28 23, 25 25, 20 30 C15 25, 12 23, 12 18 C12 13, 15 10, 20 10 Z" fill="currentColor"/>
                </svg>
                <h1>Helmet Detection</h1>
            </div>
            <div class="status" id="status">
                <span class="status-dot"></span>
                <span class="status-text">Ready</span>
            </div>
        </header>

        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept="image/*" hidden>
                <div class="upload-content">
                    <svg class="upload-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 15V3m0 0L7 8m5-5l5 5M2 17l.621 2.485A2 2 0 0 0 4.561 21h14.878a2 2 0 0 0 1.94-1.515L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h3>Drop your image here</h3>
                    <p>or click to browse</p>
                    <span class="file-types">Supports: JPG, PNG, BMP</span>
                </div>
            </div>
            
            <button class="btn-detect" id="detectBtn" disabled>
                <span class="btn-text">Analyze Image</span>
                <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12h14m-7-7l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
            <div class="image-container">
                <div class="image-panel">
                    <div class="panel-header">
                        <h3>Original Image</h3>
                        <span class="badge badge-blue">Source</span>
                    </div>
                    <div class="image-wrapper">
                        <img id="originalImage" alt="Original" />
                        <div class="image-overlay">
                            <span class="image-label">Uploaded Image</span>
                        </div>
                    </div>
                </div>

                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12h14m-7-7l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="divider-line"></div>
                </div>

                <div class="image-panel">
                    <div class="panel-header">
                        <h3>Detection Result</h3>
                        <span class="badge badge-green">Analyzed</span>
                    </div>
                    <div class="image-wrapper">
                        <img id="detectedImage" alt="Detected" />
                        <div class="image-overlay">
                            <span class="image-label">AI Detection</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detection Stats -->
            <div class="stats-panel" id="statsPanel">
                <h3>Detection Summary</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon stat-icon-total">🏍️</div>
                        <div class="stat-content">
                            <span class="stat-label">Motorcycles</span>
                            <span class="stat-value" id="motorcycleCount">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon stat-icon-helmet">✅</div>
                        <div class="stat-content">
                            <span class="stat-label">With Helmet</span>
                            <span class="stat-value" id="helmetCount">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon stat-icon-no-helmet">⚠️</div>
                        <div class="stat-content">
                            <span class="stat-label">Without Helmet</span>
                            <span class="stat-value" id="noHelmetCount">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon stat-icon-compliance">📊</div>
                        <div class="stat-content">
                            <span class="stat-label">Compliance Rate</span>
                            <span class="stat-value" id="complianceRate">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <p class="loading-text">Analyzing image...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
